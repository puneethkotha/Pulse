server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

faiss:
  index_path: "indexes/faiss/item_index.faiss"
  id_map_path: "indexes/faiss/item_id_map.json"
  n_probe: 32

redis:
  host: "localhost"
  port: 6379
  db: 0
  feature_ttl_seconds: 3600

recommendation:
  default_k: 10
  candidate_pool_size: 100
  use_reranker: true

kafka:
  bootstrap_servers: "localhost:9092"
  interaction_topic: "user-interactions"
  consumer_group: "feature-updater"
